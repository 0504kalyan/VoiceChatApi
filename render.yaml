# Render runs Linux containers — not Windows. Do NOT use Server=. or Trusted_Connection/Integrated Security.
# Use Azure SQL (or RDS) with SQL authentication: User Id=...; Password=...; Encrypt=True (see Azure portal connection string).
#
# Required env vars (Dashboard → Environment):
# - ConnectionStrings__DefaultConnection = cloud SQL Server connection string (see above)
# - Jwt__SigningKey = random string, 32+ characters

services:
  - type: web
    name: voicechat-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # Set the value only in the Render Dashboard (Environment) — never commit secrets.
      # ASP.NET Core maps this to ConnectionStrings:DefaultConnection.
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__SigningKey
        sync: false
