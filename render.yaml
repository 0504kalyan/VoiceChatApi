# VoiceChat API — PostgreSQL via Supabase (or any Postgres host).
#
# Required in Render Dashboard → Environment (never commit secrets):
# - SupabaseCredentials__ConnectionString  OR  ConnectionStrings__DefaultConnection
#   (Npgsql format: Host=...;Port=5432;Database=postgres;Username=...;Password=...;SSL Mode=Require;Trust Server Certificate=true)
# - Jwt__SigningKey = random string, 32+ characters

services:
  - type: web
    name: voicechat-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: SupabaseCredentials__ConnectionString
        sync: false
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__SigningKey
        sync: false
