# Required env vars on Render (Dashboard → Environment):
# - ConnectionStrings__DefaultConnection = Azure SQL / RDS connection string (Sql auth; Encrypt=True per provider)
# - Jwt__SigningKey = random string, 32+ characters
# Optional: GoogleCredentials__*, Email__*, Ollama__BaseUrl (if not localhost)

services:
  - type: web
    name: voicechat-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # Set the value only in the Render Dashboard (Environment) — never commit secrets.
      # ASP.NET Core maps this to ConnectionStrings:DefaultConnection.
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__SigningKey
        sync: false
