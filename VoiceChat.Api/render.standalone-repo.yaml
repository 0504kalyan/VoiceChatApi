# VoiceChatApi GitHub repo — copy to REPOSITORY ROOT as render.yaml
# Layout: VoiceChat.sln, VoiceChat.Api/ (Dockerfile must be at repo root; use Dockerfile.for-VoiceChatApi-github-root).
#
# Required env vars on Render (Dashboard → Environment):
# - ConnectionStrings__DefaultConnection = Azure SQL / RDS connection string (Sql auth; Encrypt=True per provider)
# - Jwt__SigningKey = random string, 32+ characters

services:
  - type: web
    name: voicechat-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__SigningKey
        sync: false
