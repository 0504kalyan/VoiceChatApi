# VoiceChatApi GitHub repo — copy to REPOSITORY ROOT as render.yaml
# Layout: VoiceChat.sln, VoiceChat.Api/ (Dockerfile at repo root).
#
# Production: set SupabaseCredentials__ConnectionString (or ConnectionStrings__DefaultConnection) + Jwt__SigningKey in Dashboard.

services:
  - type: web
    name: voicechat-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: SupabaseCredentials__ConnectionString
        sync: false
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__SigningKey
        sync: false
