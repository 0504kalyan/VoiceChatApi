# VoiceChatApi GitHub repo layout:
#   VoiceChat.sln
#   VoiceChat.Api/
#     Dockerfile
#     VoiceChat.Api.csproj
#     ...
#
# Copy this file to the REPOSITORY ROOT as render.yaml (paths below are relative to repo root).
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: voicechat-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: VoiceChat.Api/Dockerfile
    dockerContext: VoiceChat.Api
    healthCheckPath: /api/health
