# Use this file ONLY when Render is connected to a standalone Git repo whose root is this
# project folder (e.g. https://github.com/0504kalyan/VoiceChatApi with VoiceChat.Api.csproj at repo root).
#
# Copy this file to the root of that repo as render.yaml (or set Blueprint path to this filename).
# dockerfilePath / dockerContext are relative to that repository root.

services:
  - type: web
    name: voicechat-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
