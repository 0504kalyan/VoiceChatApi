# VoiceChatApi GitHub repo — copy to REPOSITORY ROOT as render.yaml
# Layout: VoiceChat.sln, VoiceChat.Api/ (Dockerfile must be at repo root; use Dockerfile.for-VoiceChatApi-github-root).
#
# Render = Linux. Use SQL auth to Azure SQL / RDS (not Trusted_Connection / Server=.).
# Required: ConnectionStrings__DefaultConnection, Jwt__SigningKey (32+ chars).

services:
  - type: web
    name: voicechat-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__SigningKey
        sync: false
