# Render Blueprint (Infrastructure as Code).
# https://render.com/docs/blueprint-spec
#
# This file lives next to the API project. In the Render dashboard, set the Blueprint path to:
#   Api/VoiceChat.Api/render.yaml
# (Render supports custom blueprint paths; default is only root render.yaml.)
#
# Paths below are relative to the Git repository root (monorepo root), not this folder:
#   - Api/VoiceChat.Api/Dockerfile
#   - Api/VoiceChat.Api/.dockerignore
#
# Service: Web Service, runtime Docker (not Static Site).
#
# Required env vars (set in Render dashboard; do not commit secrets):
#   ConnectionStrings__DefaultConnection
#   Jwt__SigningKey   (>= 32 characters)
#   Cors__Origins__0  (e.g. https://your-app.vercel.app)
# Optional: GoogleCredentials__ClientId / __ClientSecret, Ollama__BaseUrl, WebClient__PublicOrigin, etc.
#
# Local check from repo root:
#   powershell -File Api\VoiceChat.Api\scripts\verify-render-docker.ps1
#
# Separate GitHub repo (VoiceChat.Api only at repo root): see DEPLOY-STANDALONE-REPO.txt and render.standalone-repo.yaml in this folder.

services:
  - type: web
    name: voicechat-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: Api/VoiceChat.Api/Dockerfile
    dockerContext: Api/VoiceChat.Api
    healthCheckPath: /api/health
